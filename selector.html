<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PKU – Elige tu idioma</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f6ff;
      padding: 2rem;
    }

    /* Fondo con círculos decorativos */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.12;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: #4f9cf9;
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #f97b4f;
      bottom: -100px; right: -100px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: #1a2e4a;
      margin-bottom: 0.4rem;
    }

    p {
      color: #6b7a99;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .btns {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: block;
      padding: 1rem 1.4rem;
      border-radius: 1rem;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      color: white;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-es { background: linear-gradient(135deg, #f9a84f, #f97b4f); }
    .btn-ca { background: linear-gradient(135deg, #4fb8f9, #4f6ef9); }
    .btn-en { background: linear-gradient(135deg, #4ff9a0, #4f9cf9); }

    .btn .flag { font-size: 1.5rem; }
    .btn .arrow { opacity: 0.8; font-size: 1.2rem; }

    .btn .label { flex: 1; text-align: left; margin-left: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🧬</span>
    <h1>Fenilcetonuria (PKU)</h1>
    <p>Elige el idioma en el que quieres ver la información</p>

    <div class="btns">
      <a class="btn btn-es" href="index.html">Español</a>
      <a class="btn btn-ca" href="catalan.html">Català</a>
      <a class="btn btn-en" href="ingles.html">English</a>
    </div>
  </div>
</body>
</html>
